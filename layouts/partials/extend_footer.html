<script>
    (function() {
        const profile = document.getElementById("dynamic-profile");
        if (!profile) return;

        // A. 渲染月历网格
        function renderCalendar() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const today = now.getDate();

            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById("cal-header").innerText = `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById("cal-grid");
            grid.innerHTML = "";

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += '<span></span>';
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const isToday = d === today ? 'background: #14b30f; color: white; border-radius: 4px; font-weight: bold;' : '';
                grid.innerHTML += `<span style="padding: 2px 0; ${isToday}">${d}</span>`;
            }
        }

        // B. 动态定位函数
        function updatePosition() {
            const mainContent = document.querySelector(".main");
            if (!mainContent || window.innerWidth < 1350) {
                profile.style.opacity = "0";
                return;
            }
            const rect = mainContent.getBoundingClientRect();
            profile.style.left = (rect.left - 240) + "px"; 
            profile.style.top = "150px";
            profile.style.width = "200px";
            profile.style.opacity = "1";
        }

        renderCalendar();
        updatePosition();
        window.addEventListener("resize", updatePosition);
        window.addEventListener("scroll", updatePosition);
    })();
</script>

<script>
    (function() {
        var sidebar = document.getElementById("toc-sidebar");
        if (!sidebar) return;
        var links = sidebar.querySelectorAll("a");
        var headings = [];
        links.forEach(function(a) {
            var id = a.getAttribute("href");
            if (id && id.startsWith("#")) {
                var el = document.getElementById(id.slice(1));
                if (el) headings.push({ link: a, el: el });
            }
        });
        if (!headings.length) return;
        window.addEventListener("scroll", function() {
            var scrollPos = window.scrollY + 120;
            var active = null;
            headings.forEach(function(h) {
                if (h.el.offsetTop <= scrollPos) active = h.link;
            });
            links.forEach(function(a) { a.classList.remove("active"); });
            if (active) active.classList.add("active");
        });
    })();
</script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const text = "{{ .Site.Params.description }}"; 
        const target = document.querySelector(".header-description") || document.querySelector(".description");
        
        if (target) {
            target.innerHTML = '<span class="typing-text"></span><span class="typing-cursor"></span>';
            const textContainer = target.querySelector(".typing-text");
            let i = 0;
            const speed = 100;

            function typeWriter() {
                if (i < text.length) {
                    textContainer.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typeWriter, speed);
                }
            }
            typeWriter();
        }
    });
</script>

<style>
    .typing-cursor {
        display: inline-block;
        width: 2px;
        height: 1em;
        background-color: var(--primary);
        margin-left: 4px;
        animation: blink 0.7s infinite;
        vertical-align: middle;
    }
    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
    }
</style>

<script>
    (function() {
        const path = window.location.pathname;
        
        // 增加判断：只要 body 有 single 类且路径包含 photography
        if (path.includes('/photography/') && (document.querySelector('.post-single') || document.body.classList.contains('single'))) {
            
            document.body.classList.add('photography-wide');

            const fixLayout = () => {
                // 1. 暴力拆除所有父级容器的宽度限制
                // 增加 .post-content 以确保它也能突破限制
                const containers = document.querySelectorAll('.container, .main, .post-single, .post-content');
                containers.forEach(el => {
                    el.style.maxWidth = '100% !important'; // 尝试强制覆盖
                    el.style.setProperty('max-width', '100%', 'important');
                    el.style.width = '100%';
                    el.style.margin = '0';
                    el.style.padding = '0';
                });
            };

            // 立即执行一次
            fixLayout();
            
            // 页面加载完成后再执行一次（处理异步图片加载）
            window.addEventListener('load', fixLayout);
            
            // 针对某些主题动态渲染，设置多重定时器保底
            setTimeout(fixLayout, 100);
            setTimeout(fixLayout, 1000); 
        }
    })();
</script>
